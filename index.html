<!doctype html>
<html lang="en">
  <head>
    <script>
      // More robust fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        const suppressError = (event) => {
          const message = event.message || (event.reason && event.reason.message) || "";
          if (message.includes('Cannot set property fetch of #<Window>') || 
              message.includes('fetch') && message.includes('only a getter')) {
            if (event.preventDefault) event.preventDefault();
            console.warn('YEAH: Suppressed non-fatal fetch assignment error.');
            return true;
          }
          return false;
        };

        // 1. Global error listener
        window.addEventListener('error', suppressError);

        // 2. Unhandled promise rejection listener
        window.addEventListener('unhandledrejection', suppressError);

        // 3. Proactive attempt to make fetch writable
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                               Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
            
            if (descriptor && descriptor.configurable) {
              Object.defineProperty(window, 'fetch', {
                value: originalFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          // Silent fail
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YEAH Agency Amsterdam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
