<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // More robust fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This attempt to make fetch writable and configurable before any other script runs.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                               Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
            
            if (descriptor && !descriptor.writable) {
              Object.defineProperty(window, 'fetch', {
                value: originalFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          // If defineProperty fails, we try to at least define it on the prototype if possible
          // or just ignore if it's already locked down.
          console.warn('AETHER/YEAH: Failed to make fetch configurable:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
